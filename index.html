<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>SIGNUP-PAGE</title>
  </head>
  <body>
    <div class="flex-row">
      <div>
        <img src="/images/greenmoon-background.jpg" class="img" />
      </div>
      <div class="bg">
        <h2>Build The future with us ---upload.</h2>
        <p>Create account</p>
        <p>account details</p>
        <div class="form-row">
          <form action="" method="post">
            <label for="first_name">
              First Name
              <input
                type="text"
                name="first_name"
                id="first_name"
                placeholder="Name"
                required
              />
            </label>
            <label for="last_name">
              Last Name
              <input
                type="text"
                name="last_name"
                id="last_name"
                placeholder="Last Name"
                required
              />
            </label>
            <label for="email">
              Email
              <input
                type="email"
                name="email"
                id="email"
                placeholder="@email"
                required
              />
            </label>

            <label for="username">
              Username
              <input
                type="text"
                name="username"
                id="username"
                placeholder="username"
                required
              />
            </label>
            <label for="password"
              >Password

              <input
                type="password"
                name="password"
                id="password"
                placeholder="password"
                required
              />
            </label>
            <div class="checkboxBtn">
              <label for="checkbox">
                <input type="checkbox" name="checkbox" id="checkbox" required />
                I agree to the Terms and Privacy Policy.
              </label>
              <button type="button" class="button">Create Account</button>
            </div>
            <p>
              Already have an account? <span><a href="">log in</a></span>
            </p>
          </form>
        </div>
        <p class="copyRight">Copyright @Sopuruchi2026</p>
      </div>
    </div>
  </body>
</html>
